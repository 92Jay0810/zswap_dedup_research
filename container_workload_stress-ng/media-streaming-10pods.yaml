# =========================================================================
# 1. 媒體串流伺服器
# =========================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: cloudsuite-media-streaming
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: server
        image: cloudsuite/media-streaming:server
        ports:
        - containerPort: 80
---
# =========================================================================
# 2. 伺服器服務中樞
# =========================================================================
apiVersion: v1
kind: Service
metadata:
  name: media-server-svc
spec:
  selector:
    job-name: cloudsuite-media-streaming
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
# =========================================================================
# 3. 客戶端大軍 (9 個獨立 Pod - EXTREME stress-ng 壓力版)
# =========================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: cloudsuite-media-client
spec:
  parallelism: 9
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: client
        image: cloudsuite/media-streaming:client
        command: ["/bin/sh", "-c"]
        # 【力度拉大點】
        # stress-ng 改為鎖死 800MB，逼迫系統進入深度 Swap
        args:
        - |
          apt-get update && apt-get install -y apache2-utils dnsutils stress-ng > /dev/null 2>&1
          
          echo "=== ⏳ 等待 Server 初始化 (15秒) ==="
          sleep 15
          
          echo "=== 🚀 Starting ab Network Stress in background ==="
          ab -t 300 -n 5000000 -c 50 -k http://media-server-svc/video.mp4 > /dev/null 2>&1 &
          
          echo "=== 🔥 Starting EXTREME stress-ng Memory Stress ==="
          stress-ng --vm 1 --vm-bytes 800M --vm-keep --timeout 300s
          
          echo "=== 🎯 Real Load Test Finished ==="
        resources:
          requests:
            memory: "400Mi"
          limits:
            memory: "1Gi" # 配合 800MB 壓力，將 Limit 拉高至 1Gi 避免被 K8s 提早擊殺
